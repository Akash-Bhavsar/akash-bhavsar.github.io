name: Build and deploy site

# Two trigger paths:
#   1. Direct push to this repo (master)           → normal deploy
#   2. repository_dispatch from the writeups repo  → pull fresh writeups, deploy
# Either way, the build always pulls the latest writeups content.

on:
  push:
    branches: ["master"]
  workflow_dispatch:
  repository_dispatch:
    types: [writeups-updated]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

env:
  WRITEUPS_REPO: Akash-Bhavsar/hack-the-box-writeups
  WRITEUPS_CHECKOUT: ./_writeups_source

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout site
        uses: actions/checkout@v4

      - name: Checkout writeups repo
        uses: actions/checkout@v4
        with:
          repository: ${{ env.WRITEUPS_REPO }}
          token: ${{ secrets.WRITEUPS_PAT }}
          path: ${{ env.WRITEUPS_CHECKOUT }}
          fetch-depth: 0  # sync script reads git log for first-commit dates

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Sync writeups
        run: ruby scripts/sync_writeups.rb
        env:
          WRITEUPS_SOURCE_DIR: ${{ env.WRITEUPS_CHECKOUT }}

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v4

      - name: Build with Jekyll
        run: bundle exec jekyll build --baseurl "${{ steps.pages.outputs.base_path }}"
        env:
          JEKYLL_ENV: production

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
