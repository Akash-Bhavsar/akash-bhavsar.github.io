title: Akash Bhavsar
tagline: OSCP+ Application Security Engineer & Pentester
description: >-
  Akash Bhavsar — OSCP+ Application Security Engineer with 8+ years across full-stack development, penetration testing, and DevSecOps. HTB writeups, security projects, and offensive security notes.
author:
  name: Akash Bhavsar
  email: arbhavsar63@gmail.com
url: https://akash-bhavsar.github.io
baseurl: ""
lang: en

logo: /assets/img/prof_pic.jpg
image: /assets/img/prof_pic.jpg

social:
  name: Akash Bhavsar
  links:
    - https://github.com/Akash-Bhavsar
    - https://www.linkedin.com/in/akash-bhavsar
    - https://app.hackthebox.com/users/2430357

permalink: /blog/:year/:title/

plugins:
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

collections:
  projects:
    output: true
    permalink: /projects/:name/
  writeups:
    output: true
    permalink: /writeups/:name/

defaults:
  - scope:
      path: ""
    values:
      image: /assets/img/prof_pic.jpg
  - scope:
      path: ""
      type: posts
    values:
      layout: post
  - scope:
      path: ""
      type: projects
    values:
      layout: project
  - scope:
      path: ""
      type: writeups
    values:
      layout: writeup
      render_with_liquid: false
  - scope:
      path: ""
      type: pages
    values:
      layout: page

markdown: kramdown
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: false

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - LICENSE
  - requirements.txt
  - graphify-out
  - .claude
  - vendor
